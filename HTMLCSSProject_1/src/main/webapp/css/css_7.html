<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	img{
		width: 160px;
		height: 250px;
	}
	img:hover {
		opacity: 0.3;
		cursor: pointer;
		border: 3px solid green;
	}
	a{
		display: block;
		color: black;
		text-decoration: none;
	}
	a:hover {
		color: #999;
	}
	
	table>thead>tr{
		background-color: orange;
	}
	table>tbody>tr:hover{
		background-color: #FC9;
	}
	
	/*
		자손 / 후손 => table / div / span
		 >    공백    
	*/
</style>
