<!-- 
	선택자 : 태그를 가지고 와서 CSS이용한 디자인
	      ----------
	      어떤 태그에 적용할지 (원하는 태그를 선택해서 디자인)
	기본 선택자
	  1) 태그명 ===> 유사한 태그가 많이 존재
	     태그명 {}
	  ------------
	  2) 아이디명 : 중복없이 지정
	     #아이디명 {}
	  3) 클래스명 : 중복 가능
	     .클래스명 {}
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
/* 태그명으로 제어 : 공통적으로 적용되는 부분 */
	img {
		width: 180px;
		height: 250px;
	}
	.red {
		border: 5px solid red;
		opacity: 0.3; /* 투명도 : 0.0~1.0 */
	}
	#green {
		border: 5px solid green;
		border-radius: 30px;
	}
</style>
</head>
<body>
	<img src="../images/m1.jpg">
	<img class="red" src="../images/m2.jpg"><!--  테두리: red -->
	<img src="../images/m3.jpg">
	<img class="red" src="../images/m4.jpg"><!--  테두리: red -->
	<img src="../images/m5.jpg">
	<img class="red" src="../images/m6.jpg"><!--  테두리: red -->
	<img id="green" src="../images/m7.jpg">
</body>
</html>
