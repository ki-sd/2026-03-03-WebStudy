<!-- 
	 129p ~ 160p
	 129p
	  선택자 (기본 선택자)
	  --------------
	  1. 태그에 CSS적용 (태그의 우선순위를 적용해 디자인)
	  2. 기본 선택자
	     *  : 전체 선택자 => 글꼴 / margin / padding
	     * {
	     	속성 : 값;
	     }
	     <a href="" id="아이디명">
	     => 중복이 된 경우 자바스크립트에서 오류 발생
	     id : 중복없는 태그 제어 => #
	     #아이디명 {
	     	속성:값;
	     }
	     class : 중복 있는 태그(여러개 동시 적용) => .
	     태그 : 태그마다 공통으로 적용
	     
	  => 순서
	     인라인 스타일
	        |
	       ID
	        |
	      Class
	        |
	       태그
	       
	  => 특별한 경우가 아니면 => 구분자로 class를 주로 사용
	  => 화면 => for
	           ---- 구분할 수 없다 (목록 / 이미지...)
	  *** HTML의 모든 태그 : id, class, style, name
	  135p 속성 선택자 ===> 태그의 구분자가 없는 경우
	          input / img / a (보통 id,class를 갖고있지 않는다)
	  태그[속성=값] ==> 같은 값
	  태그[속성*=값] ==> 포함 값
	  태그[속성^=값] ==> 시작 값
	  태그[속성$=값] ==> 끝 값
	  
	  1) input
	       => name, size, type
	  2) a
	       => href, target
	  3) img
	       => src, width, height
	  4) table
	       => <style>에서 제어
	  ---------------------------
	  
	  136p 후손 자손 동위
	  후손: 태그 태그 태그 ...
	  자손: 태그 > 태그 > 태그
	  동위: 태그 + 태그 / 태그 ~ 태그
	  
	  141p 반응 / 상태
	  :hover , :checked
	  
	  144p 구조
	  :first-child , :last-child , :nth-child(n)
	  --------------------------------------------
	  1. 단위 (148p~154p)
	  	= 크기단위 => 글자 크기
	  	  font-size => 16px
	  	  % => 100%(16px) , 50%(8px) , 150%(24px)
	  	  em : 배수 단위
	  	       0.2em => 16*0.2
	  	       2em => 2*16
	  	  px : 기본 디폴트
	  	= 색상
	  	  color: 시스템 색상 => red, blue ...
	  	  color: rgb(255,255,255) => 그림판 참조
	  	  color: #CCCCCCC , HTML 색상표
	 ===> CSS 속성시 주로 사용
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	#click{
		background: pink;
	}
	li{
		list-style: none;
		float: left;
		padding: 15px;
	}
	li:first-child {
		border-radius: 20px 0px 0px 20px;
	}
	li:last-child {
		border-radius: 0px 20px 20px 0px;
	}
	li:nth-child(2n) {
		background: #FF0003;
	}
	li:nth-child(2n+1) {
		background: #800000;
	}
</style>
<script type="text/javascript">
	window.onload=function(){
		// 자바스크립트 메인 ==> $(funtion(){})
		let btn=document.getElementById("click");
		btn.addEventListener("click",function(){
			alert("클릭 완료")
		})
	}
</script>
</head>
<body>
	<button id="click">클릭1</button>
	<button id="click">클릭2</button>
	<button id="click">클릭3</button>
	<button id="click">클릭4</button>
	<button id="click">클릭5</button>
	<hr>
	<ul>
		<li>홈</li>
		<li>회원가입</li>
		<li>맛집</li>
		<li>레시피</li>
		<li>여행</li>
		<li>커뮤니티</li>
		<li>마이페이지</li>
	</ul>
</body>
</html>
