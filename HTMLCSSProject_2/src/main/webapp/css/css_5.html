<!-- 
	구조 선택자
	1. :first-child
	2. :last-child
	3. :nth-child(수열)
	----------------- 메뉴
	
	nth-child(2n)
	2n => 0 2 4 6...
	nth-child(2n+1)
	2n+1 => 1 3 5 7...
	nth-child(3n)
	3n => 0 3 6 9...
	nth-child(3n+1)
	3n+1 => 1 4 7 10...
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	li:first-child{
		color: green;
		background: yellow;
	}
	li:last-child{
		color: blue;
		background: gray;
	}
	li:nth-child(2n){
		color: magenta;
		background: green;
	}
	li:nth-child(2n+1){
		color: violet;
		background: blue;
	}
</style>
</head>
<body>
	<ul>
		<li>메뉴 1</li>
		<li>메뉴 2</li>
		<li>메뉴 3</li>
		<li>메뉴 4</li>
		<li>메뉴 5</li>
		<li>메뉴 6</li>
		<li>메뉴 7</li>
	</ul>
</body>
</html>
