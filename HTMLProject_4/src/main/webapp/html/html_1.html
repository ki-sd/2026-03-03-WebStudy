<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
#red{
	background-color:red;
}
.green{
	background-color:green;
}
#blue{
	color:blue;
}
#yellow{
	color:yellow;
}
a{
	background-color: yellow;
}
</style>
<!-- 
	 내부 CSS : 파일 한개
	 인라인 CSS : 태그 한개
	 외부 CSS : 파일로 만듬 => 공통으로 적용
 -->
</head>
<body>
	<h1 id="red">Red</h1>
	<h1 id="blue">Blue</h1>
	<h1 class="green">Green</h1>
	<h1 id="yellow">Yellow</h1>
	<h1 class="green">Green</h1>
	<a href="#" style="color:green">Hello HTML</a>
	<!-- block 속성: 한줄 전체 차지 (println()) 
	inline 속성: 글자 크기만큼 차지 (print()) -->
	<hr style="color:blue;size:20px;">
</body>
</html>
