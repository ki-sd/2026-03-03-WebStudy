<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
.table {
	border-collapse: collapse; /* 라인선 통합 */
	border-top-width: 2px;
	border-bottom-width: 1px;
	border-top-style: solid;
	border-bottom-style: solid;
	border-top-color: #333;
	border-bottom-color: #333;
	margin: 50px auto;
	width: 600px;
}
.table td,th{
	margin: 0px;
	padding: 8px;
	font-size: 16px;
	text-align: center;
}
.table th{
	background-color: #999;
	color: #FFF;
	border-bottom-color: #333;
	border-bottom-width: 1px;
}
.table td{
	border-bottom-color: #666;
	border-bottom-width: 1px;
	border-bottom-style: dotted;
}
</style>
</head>
<body>
	<table class="table">
		<thead>
			<tr>
				<th>이름</th>
				<th>주소</th>
				<th>전화</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>홍길동</td>
				<td>서울</td>
				<td>1111-1111</td>
			</tr>
			<tr>
				<td>홍길동</td>
				<td>서울</td>
				<td>1111-1111</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
