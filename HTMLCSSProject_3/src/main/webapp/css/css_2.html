<!DOCTYPE html>
<html>
<head>

div{
	width: 200px;

}

	margin: 30px;
}

	margin: 30px 50px;

	<div class="box2"></div>
	<div class="box3"></div>
	<div class="box4"></div>
</body>
</html>
