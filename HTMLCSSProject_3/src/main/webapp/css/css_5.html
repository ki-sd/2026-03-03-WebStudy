<!-- 
	 박스 모델
	   1. 외부 간격 조절 : 태그와 태그 사이 여백
	      margin
	        => margin-top
	           margin-right
	           margin-bottom
	           margin-left
	        margin: margin-top margin-right margin-bottom margin-left
	   2. 내부 간격 조절 : 태그 간에 글자 / 이미지
	      padding
	        => padding-top
	           padding-right
	           padding-bottom
	           padding-left
	        padding: padding-top padding-right padding-bottom padding-left
	   3. 테두리
	      border
	        border-style : 선 종류
	        border-width : 두께
	        border-color : 색상
	        border-collapse : 테두리 통합 
	        border-radius : 타원형
	      border: border-style border-width border-color (순서는 상관 X)
	      
	        => border-top-left
	           border-top-right
	           border-bottom-right
	           border-bottom-left
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
img{
	border: 2px solid red;
	border-radius: 15px 30px 50px 70px;
	border-top-left-radius: 50px;
	border-bottom-right-radius: 50px;
	/*
	border-top-left-radius
	border-top-right-radius
	border-bottom-right-radius
	border-bottom-left-radius
	*/
}
</style>
</head>
<body>
	<img src="../images/m1.jpg">
</body>
</html>
