<!-- 




		<!DOCTYPE html> : HTML 5버전에 해당되는 태그/속성을 읽어온다
		                  loose.dtd
		<html> : HTML 문서의 시작 => 생략 가능
			<head> : 설정 파일
				<meta charset="UTF-8"> : 검색어, 화면 크기, 한글 설정
				<title>Insert title here</title> : 브라우저 이름 부여
				<script> <style> <link>
				| 화면출력 X
			</head>
			<body>
		       화면 출력하는 부분
		       => static => 코딩한 순서로 출력
		       => 문자와 관련 태그
		       => 멀티미디어
		       => 이동 태그
		       => 입력 태그
		       => 목록 태그
		       => div / span
		          ---------- JPanel => 카드
		       => 기타
		       => 시멘텍 태그
			</body>
		</html>
	
		***들여쓰기, 모든 태그/속성 => 소문자 사용
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<!-- CSS / JavaScript -->
</head>
<body>
  <!--  화면에 출력 heading : 제목 -->
  <h1>Hello HTML!!</h1>
  <h2>Hello HTML!!</h2>
  <h3>Hello HTML!!</h3>
  <h4>Hello HTML!!</h4>
  <h5>Hello HTML!!</h5>
  <h6>Hello HTML!!</h6>
</body>
</html>
